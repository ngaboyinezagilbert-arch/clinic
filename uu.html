<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Check-in UI</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    .container {
        width: 900px;
        margin: auto;
        border: 3px solid green;
        padding: 10px;
        background: #ddd;
        position: relative;
    }

    .header {
        text-align: center;
        font-size: 22px;
        padding: 10px;
        border: 2px solid #5a8;
        border-radius: 10px;
        background: #eee;
        margin-bottom: 10px;
    }

    .admin {
        position: absolute;
        right: 20px;
        top: 60px;
        color: orange;
        font-weight: bold;
        font-size: 18px;
    }

    .sidebar {
        width: 200px;
        background: #bbb;
        padding: 10px;
        float: left;
        border: 1px solid #333;
    }

    .clinic {
        background: orange;
        padding: 5px;
        text-align: center;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .menu {
        color: orange;
        line-height: 2;
        font-weight: bold;
    }

    .form-section {
        margin-left: 220px;
        padding: 10px;
    }

    label {
        display: inline-block;
        width: 80px;
        margin-top: 10px;
    }

    input, select {
        margin-top: 10px;
        padding: 5px;
    }

    .status {
        margin-top: 10px;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    table, th, td {
        border: 1px solid black;
    }

    th, td {
        padding: 8px;
        text-align: center;
    }

    .waiting {
        color: red;
        font-weight: bold;
    }

    .done {
        color: green;
        font-weight: bold;
    }

    .image {
        position: absolute;
        right: 10px;
        top: 100px;
        width: 250px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        Digital Patient Check-in System UI Design
    </div>

    <div class="admin">ADMIN</div>

    <div class="sidebar">
        <div class="clinic">Health clinic</div>
        <div class="menu">
            DASHBOARD <br>
            PATIENT <br>
            APPOINTMENTS <br>
            REPORTS
        </div>
    </div>

    <div class="form-section">
        <form>
            <label>Name:</label>
            <input type="text"><br>

            <label>Age:</label>
            <input type="number"><br>

            <label>Phone:</label>
            <input type="text"><br>

            <label>Service:</label>
            <select>
                <option>Choose an item</option>
                <option>Pharmacy</option>
                <option>Laboratory</option>
            </select><br>

            <div class="status">
                <label>Status:</label>
                <input type="radio" name="status"> Waiting
                <input type="radio" name="status"> Done
            </div>
        </form>

       
    </div>

    <!-- Replace image URL with your own -->
    <img src="download.jpg" contlors height="1000" width="900"> <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Service</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>JOHN</td>
                <td>23</td>
                <td>PHARMACY</td>
                <td class="waiting">WAITING</td>
            </tr>
            <tr>
                <td>DERICK</td>
                <td>57</td>
                <td>LABORATORY</td>
                <td class="done">DONE</td>
            </tr>
        </table>

</div>

</body>
</html>
